
# ─────────────────────────────────────────────────────────────────────────────
# CRM Research Platform — Docker Compose
# Project: Comparative Study of Rule-Based vs Lightweight ML Lead Scoring
#
# Services:
#   scoring-service   FastAPI scoring microservice (port 8000)
#   n8n               Workflow automation (port 5678)
#   n8n-postgres      Dedicated PostgreSQL for n8n internal storage ONLY
#                     (CRM data lives in Neon — no local CRM postgres needed)
#
# Usage:
#   docker-compose up -d              # start all services
#   docker-compose logs -f scoring    # tail scoring service logs
#   docker-compose down               # stop all services
#   docker-compose down -v            # stop and remove volumes (wipes n8n DB)
#
# Prerequisites:
#   - Copy .env.example to .env and fill in values
#   - DATABASE_URL must point to your Neon PostgreSQL instance
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI Scoring Microservice ───────────────────────────────────────────
  scoring:
    build:
      context: ./scoring-service
      dockerfile: Dockerfile
    container_name: crm-scoring
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      # Live reload in development: mount source so code changes reflect immediately
      - ./scoring-service:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - crm-network

  # ── n8n Workflow Automation ────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: crm-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # n8n internal storage — uses its own dedicated postgres (NOT Neon)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD:-n8n_secret_change_me}

      # n8n application settings
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/

      # Point n8n outbound calls at the NestJS API
      CRM_API_URL: http://host.docker.internal:3000

      # Disable telemetry for academic/private use
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"

      # Timezone for cron triggers
      GENERIC_TIMEZONE: ${TIMEZONE:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/.n8n/workflows  # workflow JSON files
    depends_on:
      n8n-postgres:
        condition: service_healthy
    networks:
      - crm-network
    extra_hosts:
      # Allows n8n to reach NestJS running on the host machine
      - "host.docker.internal:host-gateway"

  # ── n8n Internal PostgreSQL (NOT the CRM database) ────────────────────────
  n8n-postgres:
    image: postgres:16-alpine
    container_name: crm-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD:-n8n_secret_change_me}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network
    # Not exposed on host — only n8n needs to reach it
    expose:
      - "5432"

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  n8n_data:
    driver: local
  n8n_postgres_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  crm-network:
    driver: bridge
